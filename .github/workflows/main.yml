name: CI

on: [push, pull_request]

env:
  BINARY_PREFIX: "baidupcs-go_"
  BINARY_SUFFIX: ""
  PR_PROMPT: "::warning:: Build artifact will not be uploaded due to the workflow is trigged by pull request."
  LD_FLAGS: "-w -s"

jobs:
  build:
    name: Build binary CI
    runs-on: ubuntu-latest
    strategy:
      matrix:
        # build and publish in parallel: linux/386, linux/amd64, windows/386, windows/amd64, darwin/amd64, darwin/arm64
        goos: [linux, windows, darwin]
        goarch: ["386", amd64, arm, arm64]
        exclude:
          - goos: darwin
            goarch: arm
          - goos: darwin
            goarch: "386"
          - goos: windows
            goarch: arm64
      fail-fast: true
    steps:
      - uses: actions/checkout@v4
      - name: Setup Go environment
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Generate Windows resource files
        if: matrix.goos == 'windows'
        shell: bash
        run: |
          go install github.com/josephspurrier/goversioninfo/cmd/goversioninfo@latest
          GOVERSIONINFO="$(go env GOPATH)/bin/goversioninfo"

          rm -f resource_windows_386.syso resource_windows_amd64.syso

          GOARCH=386 "$GOVERSIONINFO" -o=resource_windows_386.syso
          GOARCH=amd64 "$GOVERSIONINFO" -o=resource_windows_amd64.syso
      
      # 🚀 重点修改：删除了“Cache downloaded module”这一整块
      
      - name: Build binary file
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          IS_PR: ${{ !!github.head_ref }}
        run: |
          if [ $GOOS = "windows" ]; then export BINARY_SUFFIX="$BINARY_SUFFIX.exe"; fi
          if $IS_PR ; then echo $PR_PROMPT; fi
          export BINARY_NAME="$BINARY_PREFIX$GOOS_$GOARCH$BINARY_SUFFIX"
          export CGO_ENABLED=0
          
          # 确保输出目录存在
          mkdir -p output
          
          # 执行构建
          go build -o "output/$BINARY_NAME" -trimpath -ldflags "$LD_FLAGS" .
          
          # 检查文件是否真的生成了
          if [ ! -f "output/$BINARY_NAME" ]; then
            echo "::error:: 构建失败，找不到输出文件 output/$BINARY_NAME"
            exit 1
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        if: ${{ !github.head_ref }}
        with:
          name: ${{ matrix.goos }}_${{ matrix.goarch }}
          path: output/
