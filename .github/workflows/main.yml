name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

env:
  BINARY_PREFIX: "baidupcs-go_"
  LD_FLAGS: "-w -s"
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build:
    name: Build binary (${{ matrix.goos }}, ${{ matrix.goarch }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        goos: [linux, windows, darwin]
        goarch: ["386", amd64, arm, arm64]
        exclude:
          - goos: darwin
            goarch: arm
          - goos: darwin
            goarch: "386"
          - goos: windows
            goarch: arm64

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Go environment
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Generate Windows resource files
        if: matrix.goos == 'windows'
        shell: bash
        run: |
          go install github.com/josephspurrier/goversioninfo/cmd/goversioninfo@latest
          GOVERSIONINFO="$(go env GOPATH)/bin/goversioninfo"

          rm -f resource_windows_386.syso resource_windows_amd64.syso

          GOARCH=386 "$GOVERSIONINFO" -o=resource_windows_386.syso
          GOARCH=amd64 "$GOVERSIONINFO" -o=resource_windows_amd64.syso

      - name: Build binary file
        shell: bash
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          GIT_TAG: ${{ github.ref_name }}
        run: |
          export CGO_ENABLED=0
          mkdir -p output

          BINARY_NAME="${BINARY_PREFIX}${GOOS}_${GOARCH}"
          if [ "$GOOS" = "windows" ]; then
            BINARY_NAME="${BINARY_NAME}.exe"
          fi

          go build -o "output/$BINARY_NAME" -trimpath -ldflags "${LD_FLAGS} -X main.Version=${GIT_TAG}" .

          if [ ! -f "output/$BINARY_NAME" ]; then
            echo "::error:: build failed, missing output/$BINARY_NAME"
            exit 1
          fi

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.goos }}_${{ matrix.goarch }}
          path: output/*
          if-no-files-found: error

  release:
    name: Publish release
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Show release files
        shell: bash
        run: ls -R dist

      - name: Publish to GitHub Releases
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          files: dist/*
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
